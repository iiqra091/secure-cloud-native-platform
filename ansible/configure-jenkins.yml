---
# Module 6: Ansible Playbook — Configure Jenkins Server
# Run: ansible-playbook -i inventory.ini configure-jenkins.yml

- name: Install and Configure Jenkins
  hosts: jenkins_servers
  become: yes

  tasks:
    - name: Install Java (Jenkins dependency)
      apt:
        name: openjdk-17-jdk
        state: present
        update_cache: yes

    - name: Add Jenkins GPG key
      apt_key:
        url: https://pkg.jenkins.io/debian-stable/jenkins.io-2023.key
        state: present

    - name: Add Jenkins repository
      apt_repository:
        repo: "deb https://pkg.jenkins.io/debian-stable binary/"
        state: present

    - name: Install Jenkins
      apt:
        name: jenkins
        state: present
        update_cache: yes

    - name: Start and enable Jenkins
      systemd:
        name: jenkins
        state: started
        enabled: yes

    - name: Add jenkins user to docker group
      user:
        name: jenkins
        groups: docker
        append: yes

    - name: Get Jenkins initial admin password
      command: cat /var/lib/jenkins/secrets/initialAdminPassword
      register: jenkins_password
      ignore_errors: yes

    - name: Print Jenkins initial password
      debug:
        msg: "Jenkins initial password: {{ jenkins_password.stdout }}"
