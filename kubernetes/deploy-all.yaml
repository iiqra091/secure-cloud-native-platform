apiVersion: apps/v1
kind: Deployment
metadata:
  name: taskflow-backend
  namespace: taskflow
spec:
  replicas: 2
  selector:
    matchLabels:
      app: taskflow-backend
  template:
    metadata:
      labels:
        app: taskflow-backend
    spec:
      containers:
        - name: backend
          image: node:20-alpine
          command:
            - sh
            - -c
            - |
              npm install express cors mongoose
              node -e "
              const express=require('express');
              const cors=require('cors');
              const mongoose=require('mongoose');
              const app=express();
              app.use(cors());
              app.use(express.json());
              mongoose.connect(process.env.MONGO_URI)
                .then(()=>console.log('DB connected'))
                .catch(e=>console.log('DB error:',e.message));
              app.get('/health',(req,res)=>res.json({status:'OK',db:mongoose.connection.readyState===1?'connected':'disconnected'}));
              app.get('/api/todos',(req,res)=>res.json([]));
              app.listen(5000,()=>console.log('Backend running on port 5000'));
              "
          ports:
            - containerPort: 5000
          env:
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: MONGO_URI
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: taskflow-backend-svc
  namespace: taskflow
spec:
  selector:
    app: taskflow-backend
  type: NodePort
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 30500
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: taskflow-frontend
  namespace: taskflow
spec:
  replicas: 2
  selector:
    matchLabels:
      app: taskflow-frontend
  template:
    metadata:
      labels:
        app: taskflow-frontend
    spec:
      containers:
        - name: frontend
          image: nginx:alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: taskflow-frontend-svc
  namespace: taskflow
spec:
  selector:
    app: taskflow-frontend
  type: NodePort
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
