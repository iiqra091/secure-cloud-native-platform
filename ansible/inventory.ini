# Module 6: Ansible Inventory
# Replace IP addresses with your actual server IPs

[devops_servers]
devops-server-1 ansible_host=YOUR_SERVER_IP ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/your-key.pem

[jenkins_servers]
jenkins-server ansible_host=YOUR_JENKINS_IP ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/your-key.pem

[k8s_masters]
k8s-master ansible_host=YOUR_K8S_MASTER_IP ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/your-key.pem

[k8s_workers]
k8s-worker-1 ansible_host=YOUR_K8S_WORKER1_IP ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/your-key.pem
k8s-worker-2 ansible_host=YOUR_K8S_WORKER2_IP ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/your-key.pem

[all:vars]
ansible_python_interpreter=/usr/bin/python3
