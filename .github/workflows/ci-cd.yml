# Module 2: CI/CD Pipeline — GitHub Actions
# Stages: Test → Security Scan → Docker Build & Push
# Repo: github.com/iiqra091/secure-cloud-native-platform

name: CI/CD Pipeline - TaskFlow DevOps

on:
  push:
    branches: [main, dev, feature/security]
  pull_request:
    branches: [main]

env:
  BACKEND_IMAGE: iiqra091/taskflow-backend
  FRONTEND_IMAGE: iiqra091/taskflow-frontend

jobs:
  # ─────────────────────────────────────────────
  # Stage 1: Unit Tests
  # ─────────────────────────────────────────────
  test:
    name: Install & Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package.json

      - name: Install Backend Dependencies
        working-directory: backend
        run: npm install

      - name: Run Unit Tests
        working-directory: backend
        run: npm test

  # ─────────────────────────────────────────────
  # Stage 2: Security Scan (Trivy)
  # ─────────────────────────────────────────────
  security-scan:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "table"
          exit-code: "0"
          severity: "CRITICAL,HIGH"
          output: "trivy-fs-report.txt"

      - name: Upload Trivy Report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-fs-report
          path: trivy-fs-report.txt

  # ─────────────────────────────────────────────
  # Stage 3: Docker Build & Push
  # ─────────────────────────────────────────────
  docker-build:
    name: Docker Build & Push to Docker Hub
    runs-on: ubuntu-latest
    needs: security-scan
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      - name: Build & Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

      - name: Scan Docker Image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.BACKEND_IMAGE }}:latest"
          format: "table"
          exit-code: "0"
          severity: "CRITICAL,HIGH"
          output: "trivy-image-report.txt"

      - name: Upload Image Scan Report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-report
          path: trivy-image-report.txt
