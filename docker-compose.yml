# Module 3: Docker Compose — Full 3-Tier App
# Tier 1: Frontend (React + Nginx)
# Tier 2: Backend (Node.js + Express)
# Tier 3: Database (MongoDB)
#
# Usage: docker compose up -d --build

networks:
  app-network:
    driver: bridge

volumes:
  mongo-data: # Persistent MongoDB storage

services:
  # ── TIER 3: Database (MongoDB) ──────────────
  mongo:
    image: mongo:7.0
    container_name: taskflow-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: taskflow
    volumes:
      - mongo-data:/data/db
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ── TIER 2: Backend (Node.js API) ───────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: taskflow-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/taskflow
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── TIER 1: Frontend (React + Nginx) ────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: taskflow-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80"]
      interval: 30s
      timeout: 5s
      retries: 3
